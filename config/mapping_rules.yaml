# =============================================================================
# DITA Converter Tool — Mapping Rules
# Style Reference: Gilbarco Passport Technical Manuals (MDE-5570A, MDE-3839Q)
# DITA Version: 2.0
# Decisions locked: 2026-03-14 | Updated S-08: 2026-03-19
# =============================================================================

topic_type: concept
topic_type_signals:
  task:
    - "proceed as follows"
    - "to configure"
    - "to install"
    - "to verify"
    - "proceed with"
  reference:
    - "parts list"
    - "the following table"
    - "field name"
    - "abbreviations and acronyms"

heading_map:
  h1_first: title
  h1: section_title
  h2: sectiondiv_title
  h3: sectiondiv_title

paragraph_map:
  default: p

list_map:
  bullet: ul
  numbered: ol
  numbered_in_task: step

step_substep_map:
  sub_bullets_under_step: info_ul
  sub_bullets_element: ul

table_map:
  default: table
  structure:
    thead: true
    multi_column: true
    colspec_naming: "col{n}"
    frame: all
    rowsep: 1
    colsep: 1
  abbreviations: dl
  abbreviation_signals:
    - "Term"
    - "Abbreviation"
    - "Acronym"

note_map:
  - pattern: "IMPORTANT INFORMATION"
    element: note
    type: notice
    match: exact_block_header
  - pattern: "^WARNING"
    element: note
    type: warning
    match: block_header
  - pattern: "^CAUTION"
    element: note
    type: caution
    match: block_header
  - pattern: "^DANGER"
    element: note
    type: danger
    match: block_header
  - pattern: "^Note[s]?:"
    element: note
    type: note
    match: inline_prefix

figure_map:
  pattern: "^Figure \\d+:"
  element: fig
  title_element: title
  image_placeholder: "[IMAGE — {caption}]"

inline_map:
  bold: b
  italic: i
  monospace: codeph

ui_path_pattern: ".+\\s*>\\s*.+"
ui_path_element: menucascade
ui_path_child: uicontrol

codeblock_signals:
  - "telnet "
  - "C:\\>"
  - "$ "
  - "http://"

drop_patterns:
  - pattern: "^Page \\d+"
    reason: pagination
  - pattern: "MDE-\\w+ .+ \\d{4}$"
    reason: pagination
  - pattern: "^© \\d{4}"
    reason: boilerplate
  - pattern: "^Table of Contents"
    reason: auto_generated
  - pattern: "^Related Documents"
    reason: deferred_to_v2

fallback_element: p
fallback_note: "Unmapped block — review in validation report"

dita_version: "2.0"
schema_profile: "gilbarco_passport_manuals"
created: "2026-03-14"
updated: "2026-03-19"
